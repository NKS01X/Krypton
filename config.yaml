server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: vidpiracy
  sslmode: disable
  max_conns: 20

rabbitmq:
  url: amqp://guest:guest@localhost:5672/
  queue_name: video.scan
  prefetch_count: 1

processing:
  frame_rate_fps: 1.0
  max_concurrent_frames: 10
  temp_dir: /tmp/vidpiracy

similarity:
  phash_threshold: 10        # max hamming distance for match
  vector_threshold: 0.85     # min cosine similarity for match
  vector_search_limit: 20    # top-K results from pgvector

embedder:
  mode: onnx                 # onnx | http
  onnx_model_path: ./models/clip-vit-b32-visual.onnx
  http_endpoint: http://localhost:8501/embed
  embedding_dim: 512
