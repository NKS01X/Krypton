server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Cloudflare Real-IP Configuration ──────────────────────────────────────
    # Trust Docker internal networks (where cloudflared runs)
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header CF-Connecting-IP;

    # Serve static assets with long-lived cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API reverse proxy (MUST be above SPA fallback) ────────────────────
    # Uses exact prefix /api (no trailing slash) so it matches:
    #   /api, /api/, /api/v1/health, /api/v1/scan/upload, etc.
    # proxy_pass has NO trailing URI — Nginx forwards the original path as-is.
    # This means /api/v1/scan → backend receives /api/v1/scan (no stripping).
    location /api {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 512M;

        # Never cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── SPA fallback — ONLY for frontend routes ───────────────────────────
    # This MUST come after /api so API paths never fall through to index.html.
    # Unmatched frontend paths (e.g. /dashboard, /login) → index.html for React Router.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain application/javascript text/css application/json image/svg+xml;
    gzip_min_length 1024;
}
