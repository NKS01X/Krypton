#cloud-config

# ── System Setup ─────────────────────────────────────────────────────────────
package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - wget
  - htop
  - tmux
  - firewalld

# ── Commands (run in order on first boot) ────────────────────────────────────
runcmd:
  # ── 1. Install Docker CE ──────────────────────────────────────────────────
  - dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  - dnf install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable --now docker
  - usermod -aG docker opc

  # ── 2. Open Firewall Ports ────────────────────────────────────────────────
  - systemctl enable --now firewalld
  - firewall-cmd --permanent --add-service=ssh
  - firewall-cmd --reload

  # ── 3. Create Swap (4 GB safety net) ──────────────────────────────────────
  - fallocate -l 4G /swapfile
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - echo '/swapfile swap swap defaults 0 0' >> /etc/fstab
  - sysctl vm.swappiness=10
  - echo 'vm.swappiness=10' >> /etc/sysctl.conf

  # ── 4. Create App Directory ───────────────────────────────────────────────
  - mkdir -p /opt/krypton
  - chown opc:opc /opt/krypton



  # ── 6. Keep-Alive Script (prevent Oracle idle reclamation) ────────────────
  - |
    cat > /opt/krypton/keepalive.sh << 'KAEOF'
    #!/bin/bash
    # Lightweight activity to stay above Oracle's 20% idle threshold
    # Runs every 6 hours via cron

    LOG="/var/log/krypton-keepalive.log"
    echo "$(date): keepalive starting" >> $LOG

    # Light CPU burst (~15 seconds)
    timeout 15 dd if=/dev/urandom of=/dev/null bs=1M count=512 2>/dev/null

    # Network activity — ping the app
    curl -sf http://localhost/api/health >> /dev/null 2>&1
    curl -sf https://${domain}/ >> /dev/null 2>&1

    # Disk I/O
    dd if=/dev/zero of=/tmp/keepalive_io bs=1M count=64 2>/dev/null
    rm -f /tmp/keepalive_io

    echo "$(date): keepalive done" >> $LOG

    # Trim log to last 100 lines
    tail -100 $LOG > $LOG.tmp && mv $LOG.tmp $LOG
    KAEOF
  - chmod +x /opt/krypton/keepalive.sh

  # ── 6. Setup Cron Jobs ───────────────────────────────────────────────────
  # Keep-alive every 6 hours
  - (crontab -u opc -l; echo "0 */6 * * * /opt/krypton/keepalive.sh") | crontab -u opc -

  # ── 8. Create deploy helper script ────────────────────────────────────────
  - |
    cat > /opt/krypton/deploy.sh << 'DEPLOYEOF'
    #!/bin/bash
    set -euo pipefail

    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    RED='\033[0;31m'
    NC='\033[0m'

    APP_DIR="/opt/krypton/app"
    REPO_URL=""

    echo -e "$${GREEN}╔══════════════════════════════════════════╗$${NC}"
    echo -e "$${GREEN}║     🚀 Krypton Deployment Script        ║$${NC}"
    echo -e "$${GREEN}╚══════════════════════════════════════════╝$${NC}"

    # Step 1: Clone or pull
    if [ -d "$APP_DIR/.git" ]; then
        echo -e "$${YELLOW}→ Pulling latest changes...$${NC}"
        cd "$APP_DIR"
        git pull origin main
    else
        if [ -z "$REPO_URL" ]; then
            echo -e "$${RED}✗ No repo found. Clone your repo first:$${NC}"
            echo "  git clone <your-repo-url> $APP_DIR"
            echo "  Then run this script again."
            exit 1
        fi
        echo -e "$${YELLOW}→ Cloning repository...$${NC}"
        git clone "$REPO_URL" "$APP_DIR"
        cd "$APP_DIR"
    fi

    # Step 2: Check .env
    if [ ! -f ".env" ]; then
        if [ -f "deploy/.env.prod.example" ]; then
            cp deploy/.env.prod.example .env
            echo -e "$${RED}✗ Created .env from template. Edit it with your secrets:$${NC}"
            echo "  nano $APP_DIR/.env"
            exit 1
        fi
    fi

    # Step 3: Build and deploy
    echo -e "$${YELLOW}→ Building containers (ARM64)...$${NC}"
    docker compose -f deploy/docker-compose.prod.yml build

    echo -e "$${YELLOW}→ Starting services...$${NC}"
    docker compose -f deploy/docker-compose.prod.yml up -d

    # Step 4: Wait for health
    echo -e "$${YELLOW}→ Waiting for services to be healthy...$${NC}"
    sleep 15

    echo ""
    echo -e "$${GREEN}→ Container status:$${NC}"
    docker compose -f deploy/docker-compose.prod.yml ps

    echo ""
    echo -e "$${GREEN}╔══════════════════════════════════════════╗$${NC}"
    echo -e "$${GREEN}║  ✅ Deployed! https://${domain}  ║$${NC}"
    echo -e "$${GREEN}╚══════════════════════════════════════════╝$${NC}"
    DEPLOYEOF
  - chmod +x /opt/krypton/deploy.sh
  - chown -R opc:opc /opt/krypton

  # ── Done ──────────────────────────────────────────────────────────────────
  - echo "cloud-init: Krypton server setup complete" >> /var/log/cloud-init-krypton.log
