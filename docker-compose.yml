version: "3.8"

services:

  # ── PostgreSQL + pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vidpiracy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10


  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── API Gateway ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/bin/api"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: vidpiracy
      JINA_API_KEY: ${JINA_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SERP_API_KEY: ${SERP_API_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml
      - vidtmp:/tmp/vidpiracy

  # ── Worker ────────────────────────────────────────────────────────────────
  # Scale with: docker compose up -d --scale worker=3
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/bin/worker"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: vidpiracy
      JINA_API_KEY: ${JINA_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SERP_API_KEY: ${SERP_API_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml
      - vidtmp:/tmp/vidpiracy

  # ── Frontend (Vite → nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
  rabbitmqdata:
  vidtmp:
