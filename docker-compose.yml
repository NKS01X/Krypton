version: "3.8"

services:

  # ── PostgreSQL + pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vidpiracy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10


  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── API Gateway ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/bin/api"]
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: vidpiracy
      JINA_API_KEY: ${JINA_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SERP_API_KEY: ${SERP_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./config.yaml:/app/config.yaml
      - vidtmp:/tmp/vidpiracy

  # ── Worker ────────────────────────────────────────────────────────────────
  # Scale with: docker compose up -d --scale worker=3
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/bin/worker"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: vidpiracy
      JINA_API_KEY: ${JINA_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SERP_API_KEY: ${SERP_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production}
    volumes:
      - ./config.yaml:/app/config.yaml
      - vidtmp:/tmp/vidpiracy

  # ── Frontend (Vite → nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api

  # ── PoW-Shield DDoS Protection Proxy ───────────────────────────────────────
  pow-shield:
    image: ruisiang/pow-shield:latest
    restart: unless-stopped
    ports:
      - "5173:3000"
    environment:
      - PORT=3000
      - BACKEND_URL=http://frontend:80
      - POW=on
      - DIFFICULTY=10
      - SESSION_KEY=${SESSION_KEY}
      - RATE_LIMIT=on
      - RATE_LIMIT_SAMPLE_MINUTES=60
      - RATE_LIMIT_SESSION_THRESHOLD=150
      - RATE_LIMIT_BAN_IP=on
      - RATE_LIMIT_IP_THRESHOLD=1000
      - RATE_LIMIT_BAN_MINUTES=10
      - WAF=on
    depends_on:
      - frontend

volumes:
  pgdata:
  rabbitmqdata:
  vidtmp:
