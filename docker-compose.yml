version: "3.8"

services:
  # PostgreSQL + pgvector — vector similarity search ke liye
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vidpiracy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d  # Auto-run migrations on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # RabbitMQ — job queue for distributed processing
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI — browser mein localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway — HTTP server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/bin/api"]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # Config overrides via env — Viper automatic env se uthayega
      DATABASE_HOST: postgres
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    volumes:
      - ./config.yaml:/app/config.yaml
      - /tmp/vidpiracy:/tmp/vidpiracy

  # Worker — queue consumer, heavy processing yahan hoti hai
  # Multiple workers scale karne ke liye: docker-compose up --scale worker=3
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/bin/worker"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    volumes:
      - ./config.yaml:/app/config.yaml
      - /tmp/vidpiracy:/tmp/vidpiracy
    deploy:
      replicas: 2  # Default 2 workers, zyada chahiye toh scale karo

volumes:
  pgdata:
